<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Shelfie - Book Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .input-section {
            margin: 30px 0;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-camera {
            background: #667eea;
            color: white;
        }

        .btn-camera:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-upload {
            background: #764ba2;
            color: white;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }

        #fileInput {
            display: none;
        }

        .preview-section {
            margin: 30px 0;
            display: none;
        }

        .preview-section.active {
            display: block;
        }

        .book-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .search-section {
            margin: 20px 0;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1em;
            margin-bottom: 10px;
        }

        .search-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .search-btn:hover {
            background: #764ba2;
        }

        .search-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results-section {
            display: none;
            text-align: left;
            margin: 30px 0;
        }

        .results-section.active {
            display: block;
        }

        .book-result {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
        }

        .book-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .book-author {
            color: #666;
            font-size: 1em;
            margin-bottom: 10px;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2em;
        }

        .rating-value {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .stars {
            color: #ffc107;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }

        .error.active {
            display: block;
        }

        .info {
            background: #d1ecf1;
            color: #0c5460;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Shelfie</h1>
        <p class="subtitle">Scan a book and get reviews instantly!</p>

        <div class="info">
            ℹ️ <strong>Setup:</strong> You'll need a free <a href="https://developers.google.com/books" target="_blank">Google Books API key</a>. Paste it below!
        </div>

        <div class="input-section">
            <input type="text" id="apiKeyInput" class="search-input" placeholder="Paste your Google Books API key here" value="AIzaSyDdZpMAKHajCIaBWnisxAGnOLw2THGIDxw">
        </div>

        <div class="button-group">
            <button class="btn-camera" onclick="startCamera()">📷 Take Photo</button>
            <button class="btn-upload" onclick="uploadImage()">📁 Upload Image</button>
        </div>

        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">

        <div class="preview-section" id="previewSection">
            <img id="previewImage" class="book-image" alt="Book preview">
            <div class="search-section">
                <input type="text" id="bookSearch" class="search-input" placeholder="Enter book title or ISBN..." onkeypress="if(event.key==='Enter') searchBook()">
                <button class="search-btn" onclick="searchBook()">🔍 Search Book</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Searching for book...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="results-section" id="resultsSection">
            <div id="resultsContainer"></div>
        </div>
    </div>

    <script>
        // Configuration
        let API_KEY = 'AIzaSyDdZpMAKHajCIaBWnisxAGnOLw2THGIDxw';

        // Update API key from input
        document.getElementById('apiKeyInput').addEventListener('change', (e) => {
            API_KEY = e.target.value.trim();
            if (API_KEY) {
                showError('✅ API key saved!', false);
            }
        });

        // Take a photo with camera
        function startCamera() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.capture = 'environment'; // Use rear camera
            input.onchange = (e) => handleFileSelect(e);
            input.click();
        }

        // Upload image from device
        function uploadImage() {
            document.getElementById('fileInput').click();
        }

        // Handle file selection
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const imageData = e.target.result;
                document.getElementById('previewImage').src = imageData;
                document.getElementById('previewSection').classList.add('active');
                document.getElementById('resultsSection').classList.remove('active');
                document.getElementById('bookSearch').value = '';
                hideError();
            };
            reader.readAsDataURL(file);
        }

        // Search for book
        async function searchBook() {
            if (!API_KEY) {
                showError('❌ Please enter your Google Books API key first!');
                return;
            }

            const bookTitle = document.getElementById('bookSearch').value.trim();
            if (!bookTitle) {
                showError('❌ Please enter a book title or ISBN!');
                return;
            }

            showLoading(true);
            hideError();

            try {
                const response = await fetch(
                    `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(bookTitle)}&key=${API_KEY}&maxResults=1`
                );

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();

                if (!data.items || data.items.length === 0) {
                    showError('❌ Book not found. Try another search!');
                    showLoading(false);
                    return;
                }

                const book = data.items[0].volumeInfo;
                displayResults(book);
                showLoading(false);

            } catch (error) {
                console.error('Error:', error);
                showError(`❌ Error: ${error.message}`);
                showLoading(false);
            }
        }

        // Display search results
        function displayResults(book) {
            const title = book.title || 'Unknown';
            const author = book.authors ? book.authors.join(', ') : 'Unknown Author';
            const rating = book.averageRating || 'N/A';
            const ratingsCount = book.ratingsCount || 0;

            const starsHtml = rating !== 'N/A' 
                ? `<span class="stars">${'⭐'.repeat(Math.round(rating))}</span>`
                : '';

            const ratingDisplay = rating !== 'N/A'
                ? `${rating}/5 (${ratingsCount} reviews)`
                : 'No ratings yet';

            const html = `
                <div class="book-result">
                    <div class="book-title">${title}</div>
                    <div class="book-author">by ${author}</div>
                    <div class="rating">
                        <span class="rating-value">${ratingDisplay}</span>
                        ${starsHtml}
                    </div>
                    <p style="margin-top: 15px; color: #666; font-size: 0.95em;">
                        ${book.description ? book.description.substring(0, 200) + '...' : 'No description available'}
                    </p>
                </div>
            `;

            document.getElementById('resultsContainer').innerHTML = html;
            document.getElementById('resultsSection').classList.add('active');
        }

        // Show/hide loading spinner
        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }

        // Show/hide error message
        function showError(message, isError = true) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.toggle('active', true);
            if (!isError) {
                setTimeout(() => errorDiv.classList.remove('active'), 3000);
            }
        }

        function hideError() {
            document.getElementById('error').classList.remove('active');
        }
    </script>
</body>
</html>
