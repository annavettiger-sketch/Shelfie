<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 Shelfie - Book Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .input-section {
            margin: 30px 0;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-camera {
            background: #667eea;
            color: white;
        }

        .btn-camera:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-upload {
            background: #764ba2;
            color: white;
        }

        .btn-upload:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #fileInput {
            display: none;
        }

        .camera-section {
            margin: 30px 0;
            display: none;
        }

        .camera-section.active {
            display: block;
        }

        #video {
            width: 100%;
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .camera-controls {
            display: flex;
            gap: 10px;
        }

        .btn-stop {
            background: #dc3545;
            color: white;
            flex: 1;
        }

        .btn-stop:hover {
            background: #c82333;
        }

        .preview-section {
            margin: 30px 0;
            display: none;
        }

        .preview-section.active {
            display: block;
        }

        .book-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .isbn-display {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: left;
            font-size: 0.95em;
        }

        .isbn-label {
            font-weight: bold;
            color: #666;
            margin-bottom: 8px;
        }

        .isbn-value {
            font-family: monospace;
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results-section {
            display: none;
            text-align: left;
            margin: 30px 0;
        }

        .results-section.active {
            display: block;
        }

        .book-result {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
        }

        .book-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .book-author {
            color: #666;
            font-size: 1em;
            margin-bottom: 10px;
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2em;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .rating-value {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .rating-source {
            font-size: 0.8em;
            color: #999;
            margin-top: 5px;
        }

        .stars {
            color: #ffc107;
            font-size: 1.3em;
        }

        .book-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
            font-size: 0.9em;
        }

        .info-item {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
        }

        .info-label {
            font-weight: bold;
            color: #667eea;
            font-size: 0.85em;
        }

        .info-value {
            color: #333;
            margin-top: 3px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }

        .error.active {
            display: block;
        }

        .info {
            background: #d1ecf1;
            color: #0c5460;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 0.95em;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-buttons button {
            flex: 1;
            padding: 10px;
            font-size: 0.9em;
        }

        .btn-retry {
            background: #6c757d;
            color: white;
        }

        .btn-retry:hover {
            background: #5a6268;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Shelfie</h1>
        <p class="subtitle">Scan a book's ISBN and get reviews instantly!</p>

        <div class="info">
            ℹ️ <strong>Setup:</strong> You'll need a free <a href="https://developers.google.com/books" target="_blank">Google Books API key</a>. Paste it below!
        </div>

        <div class="input-section">
            <input type="text" id="apiKeyInput" class="search-input" placeholder="Paste your Google Books API key here">
        </div>

        <div class="button-group">
            <button class="btn-camera" id="cameraBtn" onclick="startCamera()">📷 Scan ISBN</button>
            <button class="btn-upload" id="uploadBtn" onclick="uploadImage()">📁 Upload Image</button>
        </div>

        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">

        <!-- Camera Stream -->
        <div class="camera-section" id="cameraSection">
            <video id="video" width="100%" height="auto" playsinline></video>
            <div class="camera-controls">
                <button class="btn-stop" onclick="stopCamera()">❌ Stop Scanning</button>
            </div>
        </div>

        <!-- Preview Section -->
        <div class="preview-section" id="previewSection">
            <img id="previewImage" class="book-image" alt="Book preview">
            <div class="isbn-display" id="isbnDisplay" style="display: none;">
                <div class="isbn-label">📊 ISBN Found:</div>
                <div class="isbn-value" id="isbnValue"></div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p id="loadingText">Searching for book...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="results-section" id="resultsSection">
            <div id="resultsContainer"></div>
            <div class="action-buttons">
                <button class="btn-retry" onclick="resetApp()">🔄 Scan Another</button>
            </div>
        </div>
    </div>

    <script>
        let API_KEY = '';
        let codeReader;
        let videoElement;
        let isScanning = false;

        // Update API key from input
        document.getElementById('apiKeyInput').addEventListener('change', (e) => {
            API_KEY = e.target.value.trim();
            if (API_KEY) {
                showError('✅ API key saved!', false);
            }
        });

        // Start camera for barcode scanning
        async function startCamera() {
            if (!API_KEY) {
                showError('❌ Please enter your Google Books API key first!');
                return;
            }

            videoElement = document.getElementById('video');
            document.getElementById('cameraSection').classList.add('active');
            isScanning = true;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                videoElement.srcObject = stream;

                // Initialize ZXing barcode reader
                const hints = new Map();
                hints.set(ZXing.BarcodeFormat.EAN_13, true);
                hints.set(ZXing.BarcodeFormat.ISBN_13, true);
                hints.set(ZXing.BarcodeFormat.UPC_A, true);
                hints.set(ZXing.BarcodeFormat.CODE_128, true);

                codeReader = new ZXing.BrowserMultiFormatReader(hints);

                // Start scanning
                scanBarcodes();
            } catch (error) {
                showError(`❌ Camera access denied: ${error.message}`);
                document.getElementById('cameraSection').classList.remove('active');
            }
        }

        // Scan for barcodes in video stream
        async function scanBarcodes() {
            if (!isScanning || !videoElement) return;

            try {
                const result = await codeReader.decodeFromVideoElement(videoElement);
                if (result) {
                    const isbn = result.text;
                    stopCamera();
                    handleISBN(isbn);
                    return;
                }
            } catch (e) {
                // Continue scanning if no barcode found
            }

            if (isScanning) {
                requestAnimationFrame(scanBarcodes);
            }
        }

        // Stop camera
        function stopCamera() {
            isScanning = false;
            const videoElement = document.getElementById('video');
            if (videoElement.srcObject) {
                videoElement.srcObject.getTracks().forEach(track => track.stop());
            }
            document.getElementById('cameraSection').classList.remove('active');
        }

        // Upload image from device
        function uploadImage() {
            if (!API_KEY) {
                showError('❌ Please enter your Google Books API key first!');
                return;
            }
            document.getElementById('fileInput').click();
        }

        // Handle file selection
        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const imageData = e.target.result;
                document.getElementById('previewImage').src = imageData;
                document.getElementById('previewSection').classList.add('active');
                document.getElementById('resultsSection').classList.remove('active');
                document.getElementById('isbnDisplay').style.display = 'none';
                hideError();

                // Scan image for barcode
                await scanImageForISBN(imageData);
            };
            reader.readAsDataURL(file);
        }

        // Scan image for ISBN barcode
        async function scanImageForISBN(imageData) {
            showLoading(true, 'Scanning for ISBN barcode...');

            try {
                const img = new Image();
                img.onload = async () => {
                    const hints = new Map();
                    hints.set(ZXing.BarcodeFormat.EAN_13, true);
                    hints.set(ZXing.BarcodeFormat.ISBN_13, true);
                    hints.set(ZXing.BarcodeFormat.UPC_A, true);

                    const reader = new ZXing.BrowserMultiFormatReader(hints);
                    try {
                        const result = await reader.decodeFromImageElement(img);
                        if (result) {
                            handleISBN(result.text);
                        } else {
                            showError('❌ No ISBN barcode found in image. Try a clearer photo!');
                            showLoading(false);
                        }
                    } catch (e) {
                        showError('❌ Could not read barcode. Try another image!');
                        showLoading(false);
                    }
                };
                img.src = imageData;
            } catch (error) {
                showError(`❌ Error: ${error.message}`);
                showLoading(false);
            }
        }

        // Handle ISBN found
        async function handleISBN(isbn) {
            document.getElementById('isbnValue').textContent = isbn;
            document.getElementById('isbnDisplay').style.display = 'block';
            await searchBook(isbn);
        }

        // Search for book by ISBN (Google Books + Open Library)
        async function searchBook(isbn) {
            showLoading(true, 'Searching for book...');
            hideError();

            try {
                // Fetch from Google Books API
                const googleResponse = await fetch(
                    `https://www.googleapis.com/books/v1/volumes?q=isbn:${encodeURIComponent(isbn)}&key=${API_KEY}&maxResults=1`
                );

                if (!googleResponse.ok) {
                    throw new Error(`API Error: ${googleResponse.status}`);
                }

                const googleData = await googleResponse.json();

                if (!googleData.items || googleData.items.length === 0) {
                    showError('❌ Book not found. Check the ISBN and try again!');
                    showLoading(false);
                    return;
                }

                const book = googleData.items[0].volumeInfo;
                
                // Fetch ratings from Open Library API
                const olResponse = await fetch(
                    `https://openlibrary.org/api/books?bibkeys=ISBN:${encodeURIComponent(isbn)}&jscmd=data&format=json`
                );
                
                let ratings = null;
                if (olResponse.ok) {
                    const olData = await olResponse.json();
                    const bookKey = `ISBN:${isbn}`;
                    if (olData[bookKey] && olData[bookKey].ratings) {
                        ratings = olData[bookKey].ratings;
                    }
                }

                displayResults(book, ratings);
                showLoading(false);

            } catch (error) {
                console.error('Error:', error);
                showError(`❌ Error: ${error.message}`);
                showLoading(false);
            }
        }

        // Display search results
        function displayResults(book, ratings) {
            const title = book.title || 'Unknown';
            const author = book.authors ? book.authors.join(', ') : 'Unknown Author';
            const pageCount = book.pageCount || 'Unknown';
            const publishedDate = book.publishedDate || 'Unknown';
            
            let ratingDisplay = 'No ratings yet';
            let starsHtml = '';

            if (ratings && ratings.average) {
                const avgRating = Math.round(ratings.average * 10) / 10;
                const roundedRating = Math.round(avgRating);
                starsHtml = `<span class="stars">${'⭐'.repeat(Math.min(roundedRating, 5))}</span>`;
                ratingDisplay = `${avgRating}/5 (${ratings.count} reviews)`;
            } else if (book.averageRating) {
                const avgRating = Math.round(book.averageRating * 10) / 10;
                const roundedRating = Math.round(avgRating);
                starsHtml = `<span class="stars">${'⭐'.repeat(Math.min(roundedRating, 5))}</span>`;
                ratingDisplay = `${avgRating}/5 (${book.ratingsCount || 0} reviews)`;
            }

            const html = `
                <div class="book-result">
                    <div class="book-title">${title}</div>
                    <div class="book-author">by ${author}</div>
                    <div class="rating">
                        <span class="rating-value">${ratingDisplay}</span>
                        ${starsHtml}
                    </div>
                    ${ratings ? '<div class="rating-source">📚 From Open Library</div>' : ''}
                    <div class="book-info">
                        <div class="info-item">
                            <div class="info-label">📖 Pages</div>
                            <div class="info-value">${pageCount}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">📅 Published</div>
                            <div class="info-value">${publishedDate}</div>
                        </div>
                    </div>
                    <p style="margin-top: 15px; color: #666; font-size: 0.95em;">
                        ${book.description ? book.description.substring(0, 200) + '...' : 'No description available'}
                    </p>
                </div>
            `;

            document.getElementById('resultsContainer').innerHTML = html;
            document.getElementById('resultsSection').classList.add('active');
        }

        // Reset app
        function resetApp() {
            stopCamera();
            document.getElementById('previewSection').classList.remove('active');
            document.getElementById('resultsSection').classList.remove('active');
            document.getElementById('isbnDisplay').style.display = 'none';
            document.getElementById('previewImage').src = '';
            document.getElementById('fileInput').value = '';
        }

        // Show/hide loading
        function showLoading(show, text = 'Searching for book...') {
            document.getElementById('loading').classList.toggle('active', show);
            document.getElementById('loadingText').textContent = text;
        }

        // Show/hide error
        function showError(message, isError = true) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.toggle('active', true);
            if (!isError) {
                setTimeout(() => errorDiv.classList.remove('active'), 3000);
            }
        }

        function hideError() {
            document.getElementById('error').classList.remove('active');
        }
    </script>
</body>
</html>
